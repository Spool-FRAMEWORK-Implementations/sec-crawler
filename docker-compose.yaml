version: '3.8'

services:
  crawler:
    image: crawler:latest
    deploy:
      replicas: 2

      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 120s

    healthcheck:
      test: "curl -f -s -o /dev/null http://localhost:8080/spool/health || exit 1"
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: ingress