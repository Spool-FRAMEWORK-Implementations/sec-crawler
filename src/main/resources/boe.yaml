infrastructure:
  watchdog:
    url: "http://host.docker.internal:8090"

  eventBus:
    type: KAFKA
    url: "host.docker.internal:9092"

  inbox:
    s3:
      bucket: spool-inbox
      region: us-east-1
      endpoint: "http://host.docker.internal:4566"

  dataLake:
    s3:
      bucket: spool-datalake
      region: us-east-1
      endpoint: "http://host.docker.internal:4566"

modules:
  - crawler:
      id: boe-crawler
      source:
        id: boe-ticker
        poll:
          http:
            url: "https://boe.es/datosabiertos/api/boe/sumario/20260428"
          schedule:
            everyMilliseconds: 86400000
        format: JSON_ARRAY
        rootPath: data.sumario.diario.0.seccion
        enrichment:
            - source: data.sumario.metadatos
              target: metadata
            - source: data.sumario.diario.0.sumario_diario
              target: sumario_diario
      eventMapping:
        namingConvention: SNAKE_CASE
        attributeList:
          - value: nombre
          - value: departamento.nombre