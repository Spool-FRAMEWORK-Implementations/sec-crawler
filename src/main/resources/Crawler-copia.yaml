infrastructure:
  watchdog:
    url: "http://host.docker.internal:8090"

  eventBus:
    type: "KAFKA"
    url: "host.docker.internal:9092"

  inbox:
    s3:
      bucket: spool-inbox
      region: us-east-1
      endpoint: "http://host.docker.internal:4566"

  dataLake:
    s3:
      bucket: spool-datalake
      region: us-east-1
      endpoint: "http://host.docker.internal:4566"

modules:
  - crawler:
      id: "microsoft-crawler"
      source:
        id: "sec-microsoft"
        poll:
          http:
            url: "https://data.sec.gov/api/xbrl/companyfacts/CIK0000789019.json"
          schedule:
            everyMilliseconds: 120000
        format: JSON_OBJECT
      eventMapping:
        namingConvention: SNAKE_CASE
        attributeList:
          - value: "cik"

  - crawler:
