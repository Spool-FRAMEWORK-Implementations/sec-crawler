infrastructure:
  watchdog:
    url: "http://host.docker.internal:8090"

  eventBus:
    type: KAFKA
    url: "host.docker.internal:9092"

  inbox:
    s3:
      bucket: boe-inbox
      region: us-east-1
      endpoint: "http://host.docker.internal:4566"

  dataLake:
    s3:
      bucket: spool-datalake
      region: us-east-1
      endpoint: "http://host.docker.internal:4566"

modules:
  - crawler:
      id: boe-crawler
      source:
        id: boe-ticker
        poll:
          custom:
            pluginName: S3_BOE
            configuration:
              bucket: spool-inbox
              region: us-east-1
              endpoint: "http://host.docker.internal:4566"
          schedule:
            everyMilliseconds: 3600000
        format: JSON_ARRAY
      eventMapping:
        namingConvention: SNAKE_CASE
        attributeList:
          - value: departamento.nombre