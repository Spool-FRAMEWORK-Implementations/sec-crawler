infrastructure:
  watchdog:
    url: "http://host.docker.internal:8090"

  eventBus:
    type: IN_MEMORY
    url: "host.docker.internal:9092"

  inbox:
    custom:
      pluginName: FILE_SYSTEM
      configuration:
        path: "D:/spool/inbox"

  dataLake:
    custom:
        pluginName: FILE_SYSTEM
        configuration:
          path: "D:/spool/datalake"

modules:
  - crawler:
      id: esios-generacion-eolica
      source:
        id: esios-api
        poll:
          custom:
            pluginName: ESIOS_API
            configuration:
              apiKey: APIKEY
              indicatorId: 1159
              lookbackMinutes: 120
              timeTrunc: hour
          schedule:
            everyMilliseconds: 3600000
        format: JSON_ARRAY
        rootPath: indicator.values
        enrichment:
          - source: indicator.id
            target: indicator_id
          - source: indicator.name
            target: indicator_name
      eventMapping:
        namingConvention: SNAKE_CASE
        attributeList:
          - value: indicator_id

