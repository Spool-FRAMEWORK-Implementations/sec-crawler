infrastructure:
  watchdog:
    url: "http://host.docker.internal:8090"

  eventBus:
    type: IN_MEMORY
    url: "host.docker.internal:9092"

  inbox:
    custom:
      pluginName: FILE_SYSTEM
      configuration:
        path: "D:/Projects/SpoolExamples/sec-crawler/"

modules:
  - crawler:
      id: esios-demanda-real
      source:
        id: esios-api
        poll:
          custom:
            pluginName: ESIOS_API
            configuration:
              apiKey: APIKEY
              indicatorId: 1293
              lookbackMinutes: 10
              timeTrunc: "five_minutes"
          schedule:
            everyMilliseconds: 300000
        format: JSON_ARRAY
        rootPath: indicator.values
        enrichment:
          - source: indicator.name
            target: indicator_name
          - source: indicator.short_name
            target: indicator_short_name
          - source: indicator.id
            target: indicator_id
      eventMapping:
        namingConvention: SNAKE_CASE
        attributeList:
          - value: indicator_short_name

  - crawler:
